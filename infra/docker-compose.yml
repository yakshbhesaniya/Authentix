version: "3.9"

services:
  # ─── Databases & Infra ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authentix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authentix_secret}
      POSTGRES_DB: ${POSTGRES_DB:-authentix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-authentix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-authentix_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── API Gateway ───────────────────────────────────────────────────
  gateway:
    build:
      context: ../apps/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://authentix:authentix_secret@postgres:5432/authentix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-authentix}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-authentix_secret}
      INGESTION_URL: http://ingestion:8001
      PLAGIARISM_URL: http://plagiarism:8002
      AI_DETECTION_URL: http://ai-detection:8003
      HUMANIZER_URL: http://humanizer:8004
      EVALUATION_URL: http://evaluation:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - authentix_net

  # ─── Python Microservices ──────────────────────────────────────────
  ingestion:
    build:
      context: ../services/ingestion
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-authentix}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-authentix_secret}
    networks:
      - authentix_net

  plagiarism:
    build:
      context: ../services/plagiarism
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    volumes:
      - model_cache:/root/.cache
    networks:
      - authentix_net

  ai-detection:
    build:
      context: ../services/ai-detection
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - model_cache:/root/.cache
    networks:
      - authentix_net

  humanizer:
    build:
      context: ../services/humanizer
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      REDIS_URL: redis://redis:6379
      AI_DETECTION_URL: http://ai-detection:8003
    volumes:
      - model_cache:/root/.cache
    networks:
      - authentix_net

  evaluation:
    build:
      context: ../services/evaluation
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://authentix:authentix_secret@postgres:5432/authentix
      REDIS_URL: redis://redis:6379
    networks:
      - authentix_net

  # ─── Frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    networks:
      - authentix_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - web
    networks:
      - authentix_net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  model_cache:

networks:
  authentix_net:
    driver: bridge
