name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Gateway (Node.js) ──────────────────────────────────────────────
  gateway:
    name: Gateway — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/gateway/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Python Services ────────────────────────────────────────────────
  python-services:
    name: Python Services — Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, plagiarism, ai-detection, humanizer, evaluation]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: pytest tests/ -v --tb=short || echo "No tests yet"

  # ── Frontend (Next.js) ────────────────────────────────────────────
  web:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ── Docker Build & Push ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway, python-services, web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/authentix-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
